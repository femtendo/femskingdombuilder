# ==============================================================================
# Non-Mod-Specific Properties
# ==============================================================================
# The mod loader to use. For regular Forge mods, it is 'javafml'.
modLoader="javafml"

# The version range of the mod loader to match. 
# Forge for 1.21.1 is version 52, so we require version 52 or higher.
loaderVersion="[52,)"

# The license for your mod. (e.g., "MIT", "All Rights Reserved", etc.)
license="All Rights Reserved"


# ==============================================================================
# Mod-Specific Properties
# ==============================================================================
# This section defines the specific mod. You can have multiple [[mods]] sections 
# if your jar contains multiple mods, but usually, there is just one.
[[mods]]

# The modid. Must be lowercase alphanumeric and match your main class setup.
modId="kingdombuilder"

# The version of the mod. 
version="0.1.0"

# The display name of the mod as it appears in the in-game mods list.
displayName="Kingdom Builder"

# An image file used as a logo in the mods list (must be in your root resources folder).
# logoFile="kingdombuilder_logo.png" 

# A multiline string describing your mod.
description='''
A Minecraft Forge 1.21.1 mod focused on settlement and kingdom mechanics, taxation, and diplomacy.
'''

# ==============================================================================
# Dependency Configurations
# ==============================================================================
# You must require Minecraft itself.
[[dependencies.kingdombuilder]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.21.1,1.22)"
    ordering="NONE"
    side="BOTH"

# You must require Forge.
[[dependencies.kingdombuilder]]
    modId="forge"
    mandatory=true
    versionRange="[52,)"
    ordering="NONE"
    side="BOTH"